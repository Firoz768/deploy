name : ec2 deployment
on: 
  push:
    branches:
      -main

jobs:
  deploy:
    runs_on: ubuntu latest

  steps:
    - name: checkout source code
      uses: actions/checkout@v6
    - name: deploy via ssh
      uses: appleboy/ssh-action@v1
      with:
        host: ${{secrets.SSH_HOST}}
        username: ubuntu
        key: ${{secrets.SSH_KEY}}
        script:  |
          cd ~/deploy
          git pull
          sudo docker compose down
          sudo docker compose up -d --build